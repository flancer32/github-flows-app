<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe8;
        --fg: #1f2430;
        --muted: #6a717f;
        --card: rgba(255, 255, 255, 0.72);
        --line: rgba(31, 36, 48, 0.12);
        --accent: #c24b2d;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--fg);
        background:
          radial-gradient(circle at top right, rgba(194, 75, 45, 0.16), transparent 32%),
          radial-gradient(circle at bottom left, rgba(31, 36, 48, 0.08), transparent 30%),
          var(--bg);
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100vw - 32px));
        padding: 40px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 60px rgba(31, 36, 48, 0.10);
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        max-width: 54ch;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .meta {
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
        font-size: 0.95rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">404</span>
      <h1>Page not found</h1>
      <p>
        The requested path does not exist. Return to the <a href="/">home page</a> and continue from there.
      </p>
      <div class="meta">Static 404 placeholder served from <code>./web/404.html</code>.</div>
    </main>
  </body>
</html>
